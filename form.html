<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form Assignment</title>
    <meta name="author" content="Gilbertoisai Martinez">
    <meta name="description" content="This is a web fundamentals assignment for WDD131 at BYU-Pathway which simulates a product review form.">

</head>

<body>
    <form get action="review.html">
        <label for="product">Product name:</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a product</option>
            <option value="product1">Product 1</option>
            <option value="product2">Product 2</option>
            <option value="product3">Product 3</option>
        </select>
        <fieldset>
            <legend>Rating:</legend>

            <label for="x">☆ </label>
            <label for="xx">☆ ☆ </label>
            <label for="xxx">☆ ☆ ☆ </label>
            <label for="xxxx">☆ ☆ ☆ ☆ </label>
            <label for="xxxxx">☆ ☆ ☆ ☆ ☆ </label>

            <input type="radio" id="x" name="rating" value="1" required>
            <input type="radio" id="xx" name="rating" value="2" required>
            <input type="radio" id="xxx" name="rating" value="3" required>
            <input type="radio" id="xxxx" name="rating" value="4" required>
            <input type="radio" id="xxxxx" name="rating" value="5" required>
        </fieldset>

        <label for="date">Date of installation:</label>
        <input type="date" id="date" name="date">
        <fieldset>
            <legend>Which features you found useful in this product? <br>(Check all that apply)</legend>
            <label for="feature1">Durability</label>
            <input type="checkbox" id="feature1" name="feature1" value="durability">
            <label for="feature2">Ease of use</label>
            <input type="checkbox" id="feature2" name="feature2" value="easeofuse">
            <label for="feature3">Performance</label>
            <input type="checkbox" id="feature3" name="feature3" value="performance">
            <label for="feature4">Design</label>
            <input type="checkbox" id="feature4" name="feature4" value="design">
        </fieldset>
        <label for="review">Written review:</label>
        <textarea id="review" name="review"></textarea>
        <label for="name">Your name:</label>
        <input type="text" id="name" name="name">

        <button type="submit">Post Review</button>
    </form>
</body>

</html>
