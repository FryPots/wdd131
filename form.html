<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form Assignment</title>
    <meta name="author" content="Gilbertoisai Martinez">
    <meta name="description" content="This is a web fundamentals assignment for WDD131 at BYU-Pathway which simulates a product review form.">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <script src="scripts/getdates.js" defer></script>


</head>

<body>
    <main>
    <form method="get" action="review.html">

        <label for="product">Product name:</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a product</option>
        </select>

        <fieldset id="rating">
            <legend>Rating:</legend>
            
            <label for="star1">★</label>
            <input type="radio" id="star1" name="rating" value="1">
            
            <label for="star2">★</label>
            <input type="radio" id="star2" name="rating" value="2">
            
            <label for="star3">★</label>
            <input type="radio" id="star3" name="rating" value="3">

            <label for="star4">★</label>
            <input type="radio" id="star4" name="rating" value="4">
            
            <label for="star5">★</label>
            <input type="radio" id="star5" name="rating" value="5" required>

        </fieldset>

        <label for="date">Date of installation:</label>
        <input type="date" id="date" name="date" required>
        <fieldset id="features">
            <legend>Which features you found useful in this product? <br>(Check all that apply)</legend>
            <label for="feature1">Durability</label>
            <input type="checkbox" id="feature1" name="feature" value="durability">
            <label for="feature2">Ease of use</label>
            <input type="checkbox" id="feature2" name="feature" value="easeofuse">
            <label for="feature3">Performance</label>
            <input type="checkbox" id="feature3" name="feature" value="performance">
            <label for="feature4">Design</label>
            <input type="checkbox" id="feature4" name="feature" value="design">
        </fieldset>
        <label for="review">Written review:</label>
        <textarea id="review" name="review"></textarea>
        <label for="name">Your name:</label>
        <input type="text" id="name" name="name">

        <button type="submit">Post Review</button>
    </form>
    </main>
    <footer>
        <p> © <span id="currentYear"></span> ✨ Gilbertoisai Martinez Serafin Serafin ✨ Mexico </p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
