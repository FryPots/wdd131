<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexico</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Datatype:wght@100..900&display=swap"

    <link href="styles/place.css" rel="stylesheet">

</head>

<body>
    <header>
        <h1>Mexico</h1>
    </header>
    <main>
        <section id="data" class="card">
            <h2>Data</h2>
            <ul>
                <li><label>Area:</label><label>1,964,375 sq km</label></li>
                <li><label>Population:</label><label>129,000,000</label></li>
                <li><label>Capital:</label><label>Mexico City</label></li>
                <li><label>Languages:</label><label>Spanish, Indigenous languages</label></li>
                <li><label>Currency:</label><label>Mexican Peso (MXN)</label></li>
                <li><label>Time Zone:</label><label>UTC−8 to UTC−5</label></li>
                <li><label>Calling Code:</label><label>+52</label></li>
                <li><label>Internet TLD:</label><label>.mx</label></li>
            </ul>
        </section>
        <section id="weather" class="card">
            <h2>Weather</h2>
            <img src="">
            <ul>
                <li><label>Temperature:</label><label>21 °C</label></li>
                <li><label>Conditions:</label><label>Partly Sunny</label></li>
                <li><label>Wind:</label><label>10 km/h</label></li>
                <li><label>Wind Chill:</label><label>21 °C</label></li>
            </ul>

        </section>
    </main>
    <footer></footer>
